# Raspberry Pi deploy contract for YoyoPod.
# This is the single source of truth for scripts/pi_remote.py and Pi skills.

host: rpi-zero
user: pi
project_dir: ~/yoyo-py
branch: main
venv: .venv
start_cmd: python yoyopod.py
kill_processes:
  - python
  - linphonec
log_file: logs/yoyopod.log
error_log_file: logs/yoyopod_errors.log
pid_file: /tmp/yoyopod.pid
startup_marker: "YoyoPod starting"
screenshot_path: /tmp/yoyopod_screenshot.png
rsync_exclude:
  - .git/
  - __pycache__/
  - "*.pyc"
  - .venv/
  - logs/
  - node_modules/
  - "*.egg-info/"
