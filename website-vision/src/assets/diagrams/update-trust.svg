<svg viewBox="0 0 760 490" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two proposed trust chains: per-device mTLS identity from a factory-provisioned keypair, and signed updates verified before writing to A-B slots">
  <style>
    .box { fill: var(--sl-color-gray-6, #232136); stroke: var(--sl-color-gray-4, #6e6a86); stroke-width: 1.5; }
    .ext { fill: none; stroke: var(--sl-color-gray-4, #6e6a86); stroke-width: 1.5; stroke-dasharray: 6 4; }
    .hub { fill: var(--sl-color-accent-low, #4a3414); stroke: var(--sl-color-accent, #f6b02c); stroke-width: 1.5; }
    .t { fill: var(--sl-color-white, #f8f4e9); font-size: 14px; font-weight: 700; }
    .m { fill: var(--sl-color-gray-2, #d3cdc5); font-size: 11px; font-family: ui-monospace, monospace; }
    .s { fill: var(--sl-color-gray-3, #a09aa8); font-size: 11.5px; }
    .flow { stroke: var(--sl-color-gray-3, #a09aa8); stroke-width: 2; fill: none; marker-end: url(#ut-arrow); }
  </style>
  <defs>
    <marker id="ut-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--sl-color-gray-3, #a09aa8)"/>
    </marker>
  </defs>

  <text class="t" x="30" y="34" style="font-size:17px">Two trust chains</text>
  <text class="s" x="30" y="54">identity for the device, signatures for its updates — both proposed, neither built</text>

  <!-- Identity chain -->
  <text class="s" x="30" y="88">The identity chain — a device proves itself with a certificate, not a shared secret</text>

  <rect class="box" x="30" y="100" width="172" height="96" rx="10"/>
  <text class="t" x="40" y="123" style="font-size:12.5px">provisioning station</text>
  <text class="s" x="40" y="141">generates the keypair</text>
  <text class="s" x="40" y="155">submits a CSR to the CA</text>

  <rect class="box" x="233" y="100" width="134" height="96" rx="10"/>
  <text class="t" x="243" y="123" style="font-size:12.5px">private CA</text>
  <text class="s" x="243" y="141">signs the device</text>
  <text class="s" x="243" y="155">certificate</text>

  <rect class="box" x="398" y="100" width="132" height="96" rx="10"/>
  <text class="t" x="408" y="123" style="font-size:12.5px">device</text>
  <text class="s" x="408" y="141">cert + key on a</text>
  <text class="s" x="408" y="155">protected partition</text>

  <rect class="hub" x="606" y="100" width="124" height="96" rx="10"/>
  <text class="t" x="616" y="123">yoyocloud</text>
  <text class="s" x="616" y="141">authenticates at</text>
  <text class="s" x="616" y="155">the TLS layer —</text>
  <text class="s" x="616" y="169">no reusable</text>
  <text class="s" x="616" y="183">secrets to steal</text>

  <path class="flow" d="M202,148 L231,148"/>
  <text class="m" x="208" y="140">CSR</text>
  <path class="flow" d="M367,148 L396,148"/>
  <text class="m" x="370" y="140">cert</text>
  <path class="flow" d="M530,148 L604,148"/>
  <text class="m" x="555" y="126">mTLS</text>
  <text class="m" x="538" y="140">handshake</text>

  <!-- Update chain -->
  <text class="s" x="30" y="240">The update chain — nothing is written to a slot before its signature checks out</text>

  <rect class="box" x="30" y="252" width="172" height="96" rx="10"/>
  <text class="t" x="40" y="275" style="font-size:12.5px">CI signing key</text>
  <text class="s" x="40" y="293">offline-protected</text>
  <text class="s" x="40" y="307">signs every release</text>

  <rect class="box" x="233" y="252" width="134" height="96" rx="10"/>
  <text class="t" x="243" y="275" style="font-size:12.5px">signed artifact</text>
  <text class="s" x="243" y="293">yoyoOS + yoyocore</text>
  <text class="s" x="243" y="307">image</text>

  <rect class="box" x="398" y="252" width="132" height="96" rx="10"/>
  <text class="t" x="408" y="275" style="font-size:12.5px">device verify</text>
  <text class="s" x="408" y="293">signature checked</text>
  <text class="s" x="408" y="307">BEFORE writing</text>

  <rect class="box" x="606" y="252" width="124" height="96" rx="10"/>
  <text class="t" x="616" y="275" style="font-size:12.5px">A/B slots</text>
  <text class="s" x="616" y="293">inactive slot</text>
  <text class="s" x="616" y="307">→ reboot</text>
  <text class="s" x="616" y="321">→ health check</text>
  <text class="s" x="616" y="335">→ rollback</text>

  <path class="flow" d="M202,300 L231,300"/>
  <path class="flow" d="M367,300 L396,300"/>
  <path class="flow" d="M530,300 L604,300"/>
  <text class="m" x="551" y="292">write</text>

  <!-- caption -->
  <rect class="ext" x="30" y="378" width="700" height="80" rx="10"/>
  <text class="t" x="46" y="404">Proposed target — not the current build</text>
  <text class="s" x="46" y="422">Today identity is device_id + device_secret, and the A/B slots are a reliability feature</text>
  <text class="s" x="46" y="438">awaiting signatures. The two chains above are the proposed upgrade for both.</text>
</svg>
