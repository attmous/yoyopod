<svg viewBox="0 0 760 610" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pairing: the device shows a code on the canvas, the parent enters it in the yoyopod app, yoyocloud verifies the match and binds the device to the household">
  <style>
    .box { fill: var(--sl-color-gray-6, #232136); stroke: var(--sl-color-gray-4, #6e6a86); stroke-width: 1.5; }
    .ext { fill: none; stroke: var(--sl-color-gray-4, #6e6a86); stroke-width: 1.5; stroke-dasharray: 6 4; }
    .hub { fill: var(--sl-color-accent-low, #4a3414); stroke: var(--sl-color-accent, #f6b02c); stroke-width: 1.5; }
    .t { fill: var(--sl-color-white, #f8f4e9); font-size: 14px; font-weight: 700; }
    .m { fill: var(--sl-color-gray-2, #d3cdc5); font-size: 11px; font-family: ui-monospace, monospace; }
    .s { fill: var(--sl-color-gray-3, #a09aa8); font-size: 11.5px; }
    .flow { stroke: var(--sl-color-gray-3, #a09aa8); stroke-width: 2; fill: none; marker-end: url(#pair-arrow); }
  </style>
  <defs>
    <marker id="pair-arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--sl-color-gray-3, #a09aa8)"/>
    </marker>
  </defs>

  <text class="t" x="30" y="34" style="font-size:17px">Pairing — how a device joins a household</text>
  <text class="s" x="30" y="54">the device shows a code, the parent enters it, yoyocloud verifies and binds</text>

  <!-- ① the device -->
  <rect class="box" x="30" y="180" width="200" height="120" rx="10"/>
  <text class="t" x="46" y="206">① The device</text>
  <text class="s" x="46" y="224">shows a short code</text>
  <text class="s" x="46" y="240">on the canvas</text>

  <!-- ② the parent -->
  <rect class="box" x="280" y="80" width="210" height="90" rx="10"/>
  <text class="t" x="296" y="104">② The parent</text>
  <text class="s" x="296" y="122">enters or scans it</text>
  <text class="s" x="296" y="138">in the yoyopod app</text>

  <!-- ③ the yoyopod app -->
  <rect class="box" x="530" y="180" width="200" height="120" rx="10"/>
  <text class="t" x="546" y="206">③ the yoyopod app</text>
  <text class="s" x="546" y="224">on the parent's phone</text>
  <text class="s" x="546" y="240">talks only to yoyocloud</text>

  <!-- yoyocloud -->
  <rect class="hub" x="250" y="340" width="260" height="130" rx="10"/>
  <text class="t" x="266" y="364">yoyocloud</text>
  <text class="s" x="266" y="384">“is this device showing</text>
  <text class="s" x="266" y="400">this code right now?”</text>
  <text class="s" x="266" y="418">binds device ↔ household</text>

  <!-- forward flow -->
  <path class="flow" d="M170,180 L278,133"/>
  <text class="m" x="180" y="124">the short code</text>

  <path class="flow" d="M490,132 L598,178"/>
  <text class="m" x="500" y="118">typed or scanned</text>

  <path class="flow" d="M570,300 L513,371"/>
  <text class="m" x="520" y="330">the code</text>

  <!-- ④ confirmations fan back -->
  <path class="flow" d="M510,430 L650,304"/>
  <text class="m" x="580" y="386">④ paired ✓</text>

  <path class="flow" d="M250,410 L160,304"/>
  <text class="m" x="110" y="366">④ bound ✓</text>
  <text class="m" x="110" y="382">→ Hub wheel</text>

  <!-- the path that never exists -->
  <path class="ext" d="M230,240 L352,240"/>
  <path class="ext" d="M388,240 L530,240"/>
  <text class="s" x="362" y="245" style="font-size:13px">✕</text>
  <text class="s" x="334" y="220">never directly —</text>
  <text class="s" x="287" y="264">not local network, not Bluetooth</text>

  <!-- caption -->
  <rect class="ext" x="30" y="500" width="700" height="80" rx="10"/>
  <text class="t" x="46" y="526">yoyocloud is the matchmaker</text>
  <text class="s" x="46" y="544">the device and the phone never talk to each other directly —</text>
  <text class="s" x="46" y="560">pairing works identically across a table or across a continent.</text>
</svg>
