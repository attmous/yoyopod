<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The runtime's run_once cycle: forward signals, drain worker messages, translate to events and commands, apply to state, diff into patches, tick the UI, sleep 20 milliseconds">
  <style>
    .box { fill: var(--sl-color-gray-6, #2b2122); stroke: var(--sl-color-gray-4, #6d5f52); stroke-width: 1.5; }
    .hub { fill: var(--sl-color-accent-low, #4a2420); stroke: var(--sl-color-accent, #f37767); stroke-width: 1.5; }
    .t { fill: var(--sl-color-white, #f5ece1); font-size: 14px; font-weight: 700; }
    .s { fill: var(--sl-color-gray-3, #a5937f); font-size: 11.5px; }
    .m { fill: var(--sl-color-gray-2, #d8c8b3); font-size: 11px; font-family: ui-monospace, monospace; }
    .big { fill: var(--sl-color-accent, #f37767); font-size: 17px; font-weight: 800; }
    .flow { stroke: var(--sl-color-gray-3, #a5937f); stroke-width: 2.2; fill: none; marker-end: url(#rlh); }
  </style>
  <defs>
    <marker id="rlh" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--sl-color-gray-3, #a5937f)"/>
    </marker>
  </defs>

  <text class="big" x="248" y="262">run_once · ~50 Hz</text>
  <text class="s" x="252" y="284">every turn ends with a 20 ms sleep</text>

  <!-- ring of 7 stations, clockwise from top -->
  <rect class="box" x="280" y="20" width="200" height="56" rx="10"/>
  <text class="t" x="294" y="42">1 · Forward signals</text>
  <text class="s" x="294" y="60">SIGUSR1/2 → ui.screenshot</text>

  <rect class="box" x="540" y="90" width="200" height="56" rx="10"/>
  <text class="t" x="554" y="112">2 · Drain the inbox</text>
  <text class="s" x="554" y="130">≤ 64 messages per domain</text>

  <rect class="box" x="540" y="210" width="200" height="66" rx="10"/>
  <text class="t" x="554" y="232">3 · Translate</text>
  <text class="s" x="554" y="250">envelope → RuntimeEvent</text>
  <text class="s" x="554" y="264">→ RuntimeCommands (event.rs)</text>

  <rect class="box" x="540" y="340" width="200" height="56" rx="10"/>
  <text class="t" x="554" y="362">4 · Apply to the ledger</text>
  <text class="s" x="554" y="380">RuntimeState mutates</text>

  <rect class="hub" x="280" y="420" width="200" height="66" rx="10"/>
  <text class="t" x="294" y="442">5 · Diff → patches</text>
  <text class="s" x="294" y="460">before ≠ after → per-domain</text>
  <text class="s" x="294" y="474">RuntimeSnapshotPatch to UI</text>

  <rect class="box" x="20" y="340" width="200" height="56" rx="10"/>
  <text class="t" x="34" y="362">6 · Dispatch commands</text>
  <text class="s" x="34" y="380">write to worker stdins</text>

  <rect class="box" x="20" y="120" width="200" height="66" rx="10"/>
  <text class="t" x="34" y="142">7 · Tick the theater</text>
  <text class="s" x="34" y="160">UiCommand::Tick every turn</text>
  <text class="s" x="34" y="174">(UI tolerates up to 5 s)</text>

  <!-- ring arrows -->
  <path class="flow" d="M482,52 C540,58 590,68 620,88"/>
  <path class="flow" d="M640,146 L640,208"/>
  <path class="flow" d="M640,276 L640,338"/>
  <path class="flow" d="M600,396 C560,420 520,440 484,448"/>
  <path class="flow" d="M278,450 C200,440 160,420 120,398"/>
  <path class="flow" d="M120,338 L120,188"/>
  <path class="flow" d="M140,118 C180,70 230,50 278,44"/>

  <text class="s" x="248" y="308">Worker-health-only changes emit no UI patch.</text>
  <text class="s" x="248" y="326">If nothing changed, nothing crosses any wire.</text>
</svg>
