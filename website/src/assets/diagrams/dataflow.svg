<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The data loop between yoyopod-runtime and the UI host: commands and snapshots flow in, events and intents flow out, and the worker loop turns state into pixels">
  <style>
    .box { fill: var(--sl-color-gray-6, #2b2122); stroke: var(--sl-color-gray-4, #6d5f52); stroke-width: 1.5; }
    .ext { fill: none; stroke: var(--sl-color-gray-4, #6d5f52); stroke-width: 1.5; stroke-dasharray: 6 4; }
    .hub { fill: var(--sl-color-accent-low, #4a2420); stroke: var(--sl-color-accent, #f37767); stroke-width: 1.5; }
    .t { fill: var(--sl-color-white, #f5ece1); font-size: 15px; font-weight: 600; }
    .s { fill: var(--sl-color-gray-3, #a5937f); font-size: 12px; }
    .lbl { fill: var(--sl-color-gray-2, #d8c8b3); font-size: 12px; }
    .in { stroke: var(--sl-color-gray-3, #a5937f); stroke-width: 2; fill: none; marker-end: url(#dh1); }
    .out { stroke: var(--sl-color-accent, #f37767); stroke-width: 2; fill: none; marker-end: url(#dh2); }
  </style>
  <defs>
    <marker id="dh1" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--sl-color-gray-3, #a5937f)"/>
    </marker>
    <marker id="dh2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--sl-color-accent, #f37767)"/>
    </marker>
  </defs>

  <!-- runtime -->
  <rect class="ext" x="20" y="150" width="190" height="150" rx="10"/>
  <text class="t" x="40" y="176">yoyopod-runtime</text>
  <text class="s" x="40" y="196">aggregates worker state</text>
  <text class="s" x="40" y="212">(media, voip, power, …)</text>
  <text class="s" x="40" y="232">pumps Tick every 500 ms</text>
  <text class="s" x="40" y="252">routes intents to workers</text>

  <!-- ui host -->
  <rect class="hub" x="330" y="130" width="410" height="190" rx="10"/>
  <text class="t" x="350" y="156">yoyopod-ui-host — worker loop</text>
  <text class="s" x="350" y="180">decode → dispatch(AppEvent) → apply:</text>
  <text class="s" x="360" y="200">· snapshot/patch → UiRuntime state</text>
  <text class="s" x="360" y="216">· InputAction / button poll → router → commands</text>
  <text class="s" x="360" y="232">· Tick → animations advance + watchdog fed</text>
  <text class="s" x="350" y="256">then: rebuild scene → diff → render_if_dirty</text>
  <text class="s" x="350" y="276">→ LVGL → flush → framebuffer → SPI</text>
  <text class="s" x="350" y="300">watchdogs: manager 15 s · tick stall 5 s</text>

  <!-- inbound arrows -->
  <path class="in" d="M210,180 L328,180"/>
  <text class="lbl" x="218" y="170">UiCommand: Tick · PollInput</text>
  <path class="in" d="M210,220 L328,220"/>
  <text class="lbl" x="218" y="212">RuntimeSnapshot / Patch</text>
  <path class="in" d="M210,260 L328,260"/>
  <text class="lbl" x="218" y="252">InputAction · Screenshot · …</text>

  <!-- outbound arrows -->
  <path class="out" d="M330,350 C260,350 230,320 220,302"/>
  <text class="lbl" x="250" y="372">UiEvent: Intent · Input · ScreenChanged · Health · Error</text>
  <path d="M470,320 L470,350 L330,350" stroke="var(--sl-color-accent, #f37767)" stroke-width="2" fill="none"/>

  <!-- button and canvas -->
  <rect class="box" x="330" y="30" width="185" height="52" rx="10"/>
  <text class="t" x="348" y="52">button (GPIO 17)</text>
  <text class="s" x="348" y="70">polled every 250 ms</text>
  <path class="in" d="M420,82 L420,128"/>

  <rect class="box" x="555" y="30" width="185" height="52" rx="10"/>
  <text class="t" x="573" y="52">the canvas (SPI)</text>
  <text class="s" x="573" y="70">dirty regions only</text>
  <path class="out" d="M645,128 L645,82"/>

  <!-- loop caption -->
  <text class="s" x="20" y="430">The loop closes outside this process: an emitted Intent reaches a worker via the runtime, the worker acts, the next</text>
  <text class="s" x="20" y="448">RuntimeSnapshot reflects it, and the UI re-renders from that state — one-way data flow all the way around.</text>
</svg>
