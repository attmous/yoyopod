<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Intent routing: UI intent domains fan out to worker command families, and three house rules connect domains inside the runtime">
  <style>
    .box { fill: var(--sl-color-gray-6, #2b2122); stroke: var(--sl-color-gray-4, #6d5f52); stroke-width: 1.5; }
    .hub { fill: var(--sl-color-accent-low, #4a2420); stroke: var(--sl-color-accent, #f37767); stroke-width: 1.5; }
    .t { fill: var(--sl-color-white, #f5ece1); font-size: 14px; font-weight: 700; }
    .s { fill: var(--sl-color-gray-3, #a5937f); font-size: 11.5px; }
    .m { fill: var(--sl-color-gray-2, #d8c8b3); font-size: 11px; font-family: ui-monospace, monospace; }
    .flow { stroke: var(--sl-color-gray-3, #a5937f); stroke-width: 2; fill: none; marker-end: url(#irh); }
    .rule { stroke: var(--sl-color-accent, #f37767); stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#irh2); }
    .lbl { fill: var(--sl-color-accent, #f37767); font-size: 11.5px; font-weight: 600; }
  </style>
  <defs>
    <marker id="irh" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--sl-color-gray-3, #a5937f)"/>
    </marker>
    <marker id="irh2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--sl-color-accent, #f37767)"/>
    </marker>
  </defs>

  <rect class="box" x="20" y="20" width="180" height="56" rx="10"/>
  <text class="t" x="34" y="42">UI buzzer notes</text>
  <text class="m" x="34" y="60">UiIntent {domain, action}</text>

  <path class="flow" d="M200,48 L268,48"/>

  <rect class="hub" x="270" y="20" width="220" height="56" rx="10"/>
  <text class="t" x="284" y="42">The office routes</text>
  <text class="m" x="284" y="60">event.rs::commands_for_ui_intent</text>

  <!-- fan out -->
  <rect class="box" x="20" y="140" width="220" height="56" rx="10"/>
  <text class="t" x="34" y="162">Music · 6 actions</text>
  <text class="m" x="34" y="180">→ media.* (record library)</text>

  <rect class="box" x="270" y="140" width="220" height="56" rx="10"/>
  <text class="t" x="284" y="162">Call · 5 actions</text>
  <text class="m" x="284" y="180">→ voip.* (switchboard)</text>

  <rect class="box" x="520" y="140" width="220" height="56" rx="10"/>
  <text class="t" x="534" y="162">Voice · 13 actions</text>
  <text class="m" x="534" y="180">→ voip.* and voice.*</text>

  <rect class="box" x="20" y="220" width="220" height="56" rx="10"/>
  <text class="t" x="34" y="242">Power · 5 actions</text>
  <text class="m" x="34" y="260">→ power.* (boiler room)</text>

  <rect class="box" x="270" y="220" width="220" height="56" rx="10"/>
  <text class="t" x="284" y="242">Navigation · Back</text>
  <text class="s" x="284" y="260">never leaves the UI process</text>

  <rect class="box" x="520" y="220" width="220" height="56" rx="10"/>
  <text class="t" x="534" y="242">Runtime · Shutdown</text>
  <text class="s" x="534" y="260">the polite off switch</text>

  <path class="flow" d="M330,76 L120,138"/>
  <path class="flow" d="M370,76 L370,138"/>
  <path class="flow" d="M430,76 L600,138"/>
  <path class="flow" d="M340,76 L110,218"/>
  <path class="flow" d="M380,76 L375,218"/>
  <path class="flow" d="M440,76 L610,218"/>

  <!-- house rules -->
  <text class="t" x="20" y="330">House rules — cross-domain policies, all written in one file (event.rs)</text>

  <rect class="box" x="20" y="350" width="340" height="52" rx="10"/>
  <text class="t" x="34" y="372">A call pauses the music</text>
  <text class="s" x="34" y="390">voip snapshot shows a call → media.pause</text>

  <rect class="box" x="400" y="350" width="340" height="52" rx="10"/>
  <text class="t" x="414" y="372">Low battery ends the show — safely</text>
  <text class="s" x="414" y="390">20% warn · 10% critical · 15 s delay · suppress watchdog · poweroff</text>

  <rect class="box" x="20" y="422" width="340" height="52" rx="10"/>
  <text class="t" x="34" y="444">Everything interesting is telegraphed</text>
  <text class="s" x="34" y="462">battery / connectivity / playback events → cloud.publish_*</text>

  <rect class="box" x="400" y="422" width="340" height="52" rx="10"/>
  <text class="t" x="414" y="444">Backend commands are acknowledged</text>
  <text class="s" x="414" y="462">cloud.command in → routed → cloud.ack out</text>

  <text class="s" x="20" y="520">Design point: departments never talk to each other. Every cross-domain effect is a house rule at the office —</text>
  <text class="s" x="20" y="538">legible in a single file, testable without any hardware.</text>
</svg>
